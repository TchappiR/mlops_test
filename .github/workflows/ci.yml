name: CI Pipeline MLOps

on:
  push:
    branches: 
      - 'feature/*'    # Déclenchement sur les branches feature [cite: 41]
      - 'develop'      # Déclenchement sur la branche develop [cite: 45]

jobs:
  # JOB 1 : Toujours exécuté (Entraînement)
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies 
        run: |
          pip install scikit-learn joblib
          
      - name: Train model
        run: python app/training_model.py

  # JOB 2 : Uniquement pour la branche develop (Build & Publish Docker)
  docker-workflow:
    needs: train
    if: github.ref == 'refs/heads/develop' # Condition pour la branche develop [cite: 45]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # STEP 1 : Construction de l'image Docker 
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # On ne pousse pas encore
          load: true  # Charge l'image dans le démon Docker local pour test
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-iris:latest

      # STEP 2 : Publication de l'image Docker 
      - name: Publish Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true  # On pousse vers le registre 
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-iris:latest